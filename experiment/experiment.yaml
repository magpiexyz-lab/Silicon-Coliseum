# ============================================================================
# experiment.yaml — Silicon Coliseum (Rebuilt with Launchpad-mvp UI Template)
# ============================================================================
# AI-powered meme coin paper trading platform with premium investor-grade UI.
# Combines the Launchpad-mvp design system / template with Silicon Coliseum
# core business logic.
# ============================================================================

name: silicon-coliseum
owner: deepakpalrocks
type: web-app
level: 3
status: draft
quality: mvp

description: >
  AI-powered meme coin paper trading arena where users deploy autonomous AI agents
  that trade crypto meme tokens using simulated (paper) money. Users connect their
  MetaMask wallet, hold SCT tokens on Arbitrum for agent slots, customize agent
  strategies, and compete on a global P&L leaderboard — all wrapped in a premium
  dark-first glassmorphism UI.

thesis: "If crypto enthusiasts can deploy autonomous AI trading agents with zero financial risk via paper trading, then 20+ users will create at least one agent within 2 weeks, as measured by agent creation events"
target_user: Crypto enthusiasts and meme coin traders who want to experiment with AI-driven trading strategies without risking real money
distribution: |
  Post in crypto Twitter, r/cryptocurrency, r/algotrading.
  Share in Telegram/Discord meme coin communities.
  Showcase on Product Hunt and Indie Hackers.

hypotheses:
  - id: h-01
    category: demand
    statement: ">5% of visitors who see the landing page click 'Launch Your Agent'"
    metric:
      formula: "cta_click / visit_landing"
      threshold: 0.05
      operator: gte
    priority_score: 90
    experiment_level: 1
    depends_on: []
    status: pending
  - id: h-02
    category: activate
    statement: ">30% of users who connect their wallet create at least one AI agent"
    metric:
      formula: "agent_created / signup_complete"
      threshold: 0.30
      operator: gte
    priority_score: 80
    experiment_level: 2
    depends_on: [h-01]
    status: pending

behaviors:
  - id: b-01
    hypothesis_id: h-01
    given: "A crypto enthusiast visits the Silicon Coliseum landing page"
    when: "They read the value proposition"
    then: "They click 'Launch Your Agent' CTA (>5% of visitors)"
    tests:
      - "Landing page renders without errors"
      - "CTA button is visible and clickable"
    level: 1
  - id: b-02
    hypothesis_id: h-01
    given: "A visitor clicks the CTA"
    when: "They connect their MetaMask wallet"
    then: "Account is created and they land on the dashboard"
    tests:
      - "Wallet connect flow completes"
      - "User is redirected to dashboard after signup"
    level: 2
  - id: b-03
    hypothesis_id: h-02
    given: "A signed-up user is on the dashboard"
    when: "They click 'Create Agent' and configure strategy"
    then: "An AI agent is created and begins evaluating markets"
    tests:
      - "Agent creation form validates input"
      - "Agent appears in agents tab after creation"
    level: 2
  - id: b-04
    hypothesis_id: h-02
    given: "An active agent exists"
    when: "The cron job triggers evaluation"
    then: "Agent analyzes market data and executes paper trades"
    tests:
      - "Trade records appear in trade history"
      - "Agent holdings update after trades"
    level: 2

golden_path:
  - step: "Visit landing page"
    event: visit_landing
    page: landing
  - step: "Click 'Launch Your Agent'"
    event: cta_click
    page: landing
  - step: "Connect MetaMask wallet and register"
    event: signup_complete
    page: login
  - step: "Create an AI trading agent"
    event: agent_created
    page: dashboard
  - step: "View agent performance on leaderboard"
    event: view_leaderboard
    page: dashboard
target_clicks: 4

variants:
  - slug: arena
    headline: "The AI Meme Coin Trading Arena"
    subheadline: "Deploy autonomous AI agents that trade crypto meme tokens with paper money. Zero risk, maximum alpha."
    cta: "Launch Your Agent"
    promise: "AI-powered trading without the risk"
    proof: "Real-time market data from DexScreener across 12 meme tokens"
    urgency: "The arena is live — deploy your agent now"
    pain_points:
      - "Manual trading is stressful and time-consuming"
      - "Testing strategies with real money is risky"
      - "Existing paper trading tools lack AI automation"
  - slug: compete
    headline: "Compete With AI-Powered Trading Bots"
    subheadline: "Build your strategy, deploy your agent, climb the leaderboard. No real money needed."
    cta: "Enter the Arena"
    promise: "Prove your trading strategy against the best"
    proof: "Global P&L leaderboard with live DexScreener prices"
    urgency: "Top agents are already trading — join the competition"
    pain_points:
      - "No way to test trading ideas without real risk"
      - "Hard to compare strategies objectively"
      - "Algo trading tools are too complex for most traders"

funnel:
  available_from:
    reach: L1
    demand: L1
    activate: L2
  decision_framework:
    scale: "All tested dimensions >= 1.0"
    kill: "Any top-funnel (REACH or DEMAND) < 0.5"
    pivot: "2+ dimensions < 0.8"
    refine: "1+ dimensions < 1.0 but fewer than 2 below 0.8"

# ─────────────────────────────────────────────────────────────────────────────
# Tech Stack
# ─────────────────────────────────────────────────────────────────────────────
stack:
  services:
    - name: app
      runtime: nextjs
      hosting: vercel
      ui: shadcn
      testing: vitest
  database: supabase
  auth: supabase
  # Extended stack details (non-template fields preserved for reference)
  framework: next@15
  language: typescript
  runtime_version: node@20
  styling:
    engine: tailwindcss@4
    utilities: [clsx, tailwind-merge, class-variance-authority]
  components:
    library: shadcn-ui
    primitives: radix-ui
    icons: lucide-react
  animation: framer-motion@12
  ai:
    provider: cerebras
    model: llama-3.3-70b
    sdk: openai # Cerebras uses OpenAI-compatible SDK
  blockchain:
    library: ethers@6
    chain: arbitrum-one
    wallet: metamask
  validation: zod
  scheduling: pg_cron

deploy:
  url: null
  repo: null
  domain: null

# ─────────────────────────────────────────────────────────────────────────────
# Design System — Dark-first premium trading aesthetic
# Ported from Launchpad-mvp, re-themed for a crypto/trading arena vibe.
# ─────────────────────────────────────────────────────────────────────────────
design:
  philosophy: >
    Dark-first, premium trading arena aesthetic. Emerald accents signal gains
    and positive actions; amber/red signals losses and warnings. Glassmorphism
    cards, mesh gradient backgrounds, film grain overlay, and interactive
    particle systems create a high-end feel. All colors use oklch() color space.

  color_tokens:
    # Dark theme (default)
    background: "oklch(0.145 0.02 260)" # Near-black with subtle blue tint
    foreground: "oklch(0.985 0.002 260)"
    card: "oklch(0.205 0.015 260)"
    card_foreground: "oklch(0.985 0.002 260)"
    primary: "oklch(0.72 0.19 165)" # Emerald/Teal — gains, CTAs, highlights
    primary_foreground: "oklch(0.145 0.02 260)"
    secondary: "oklch(0.78 0.16 75)" # Warm Amber — warnings, losses, upsells
    secondary_foreground: "oklch(0.145 0.02 260)"
    destructive: "oklch(0.65 0.2 25)" # Red — sell signals, errors
    muted: "oklch(0.27 0.01 260)"
    muted_foreground: "oklch(0.65 0.015 260)"
    accent: "oklch(0.25 0.015 260)"
    border: "oklch(0.35 0.015 260)"
    ring: "oklch(0.72 0.19 165)"
    # Light theme applied via .light class on <html>
    light_overrides: true

  visual_effects:
    glassmorphism:
      class: ".glass"
      backdrop_blur: "16px"
      saturate: 1.4
      hover_glow: true # .glass-glow — emerald shadow on hover
    mesh_gradient:
      class: ".mesh-gradient"
      layers: 3 # Emerald + amber + blue radial gradients
      usage: [login, signup, dashboard, 404]
    grain_texture:
      class: ".grain"
      type: "SVG fractal noise"
      opacity: 0.035
      position: fixed
      pointer_events: none
    gradient_text:
      class: ".gradient-text"
      gradient: "emerald-to-amber"
      shimmer_variant: ".shimmer-text" # Scrolling highlight animation

  animations:
    css_keyframes:
      - animate-float # Organic vertical floating
      - animate-float-slow
      - animate-float-reverse
      - animate-shimmer # Scrolling gradient shimmer for text
      - animate-marquee # Infinite scroll for trust/stats bar
      - aurora-bg # Slow 4-point gradient shift
      - gradient-border # Animated conic gradient border
      - pulse-glow # Periodic emerald box-shadow pulse
      - glow-btn # Blurred gradient halo behind buttons on hover
    framer_motion:
      - AnimatePresence on all modals, dropdowns, tab content
      - layoutId="activeTab" for spring-animated tab indicators
      - Stagger container variants (60ms child delay) on dashboard sections
      - useInView for scroll-triggered section reveals
      - useScroll + useTransform for parallax on landing hero
      - Animated bar chart bars (height from 0)
      - Animated progress bars for P&L visualization

  interactive_elements:
    particles:
      component: InteractiveParticles
      renderer: canvas
      default_count: 80
      auth_page_count: 50
      features:
        - Organic float via sine/cosine motion
        - Mouse proximity repulsion
        - Drift back to base position
        - Opacity pulsing
        - Optional connecting lines between nearby particles
    cursor_follower:
      component: CursorFollower
      effect: "Soft glowing radial gradient orb following mouse"
      usage: [landing]
    animated_counters:
      component: AnimatedCounter
      trigger: useInView
      easing: cubic-ease-out

  theme:
    toggle_component: ThemeToggle
    storage_key: "silicon-coliseum-theme"
    default: dark
    light_class: ".light" # Applied to <html> element
    flash_prevention: "Blocking inline <script> in <head> reads localStorage"

  responsive:
    approach: mobile-first
    container: "max-w-7xl mx-auto"
    breakpoints:
      mobile: "grid-cols-1 or grid-cols-2"
      tablet: "sm: 2-col layouts, horizontal scroll tabs"
      desktop: "lg: multi-column grids (e.g. lg:grid-cols-4)"
    nav: "Collapses brand on small screens, horizontal tab scroll"

  skeleton_loading:
    style: "Animated pulse grey placeholders matching real layout"
    usage: "Dashboard tab switching, data fetching states"

# ─────────────────────────────────────────────────────────────────────────────
# shadcn/ui Components to Install
# ─────────────────────────────────────────────────────────────────────────────
