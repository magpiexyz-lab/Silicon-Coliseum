# ─────────────────────────────────────────────────────────────────────────────
# Pages — Detailed Specifications
# ─────────────────────────────────────────────────────────────────────────────
pages:

  landing:
    route: "/"
    layout: "Full marketing page, no auth required"
    sections:
      - hero: >
          Large gradient heading "The AI Meme Coin Trading Arena" with .shimmer-text effect.
          Subheading explaining the concept. Two CTAs: "Launch Your Agent" (primary emerald)
          and "View Leaderboard" (secondary outline). Background: mesh-gradient + interactive
          particles + cursor follower. Animated floating meme token icons.
      - stats_bar: >
          Horizontal marquee (animate-marquee) showing live stats: total agents deployed,
          total paper trades executed, top P&L%, total volume traded. AnimatedCounter on each.
      - how_it_works: >
          3-step cards with stagger animation on scroll: 1) Connect Wallet & Hold SCT,
          2) Deploy Your AI Agent, 3) Compete on the Leaderboard. Each card has icon,
          title, description, glass styling.
      - features_grid: >
          6-card grid showcasing: AI-Powered Decisions, Live Market Data, Risk Profiles,
          Global Leaderboard, Paper Trading (Zero Risk), On-Chain Token Gating.
          Cards use .glass with hover .glass-glow effect. useInView stagger reveal.
      - live_leaderboard_preview: >
          Top 5 agents from the real leaderboard. Table with rank medals (gold/silver/bronze),
          agent name, risk badge, P&L% with color coding. "View Full Leaderboard" CTA.
      - pricing: >
          3 SCT tier cards: Starter ($1 = 1 SCT), Pro ($10 = 20 SCT), Whale ($100 = 250 SCT).
          Middle card highlighted with "Popular" badge. Glass cards with gradient borders.
      - footer: "Minimal — links, disclaimer about paper trading"

  login:
    route: "/login"
    layout: "Centered glassmorphism card over particle background + mesh-gradient"
    content: >
      MetaMask fox logo, "Connect Your Wallet" heading, large "Connect MetaMask" button
      that triggers eth_requestAccounts. On success: check if registered → redirect to
      dashboard or signup. Error states for: MetaMask not installed, user rejected connection,
      wrong network.

  signup:
    route: "/signup"
    layout: "Centered glassmorphism card over particle background"
    content: >
      "Choose Your Username" heading, username input with validation (2-30 chars, alphanumeric
      + underscores), "Sign & Register" button that triggers MetaMask personal_sign.
      Success state: animated checkmark with confetti-like particles, auto-redirect to dashboard.

  dashboard:
    route: "/dashboard"
    layout: "Server component fetches all data → passes to tabbed client shell"
    nav: >
      Sticky top nav: "Silicon Coliseum" brand (gradient-text), tab navigation
      (Overview, Agents, Leaderboard), right side: SCT balance badge, market ticker toggle,
      theme toggle, wallet address dropdown (copy address, view on Arbiscan, disconnect).
    tabs:
      overview:
        content: >
          Top row: 4 stat counters (Total Portfolio Value, Total P&L%, Active Agents,
          Total Trades) — each with AnimatedCounter and green/red P&L coloring.
          Middle: portfolio value line chart (framer-motion animated) + P&L breakdown bar chart.
          Bottom left: active agents quick-view cards (mini version). Bottom right: recent
          trades feed (last 10, auto-updates). Quick action buttons: "Create Agent",
          "Buy SCT", "Evaluate Now" (manual trigger).
      agents:
        content: >
          Grid of AgentCards. Each card: glass styling, agent name, risk badge (color-coded),
          status indicator (green pulse = active, grey = paused), current value, P&L%,
          token icons row, last trade timestamp. Card actions: View Detail (opens modal),
          Toggle Active/Paused, Delete (with confirmation dialog). "Create New Agent" card
          with dashed border and + icon (checks SCT balance, shows upgrade prompt if insufficient).
          Clicking an agent opens agent-detail-modal.
      leaderboard:
        content: >
          Full-width table: rank (with medal icons for top 3), agent name, owner username,
          risk level badge, initial budget, current value, P&L% (green/red + arrow),
          trade count. Sortable columns. Current user's agents highlighted with subtle
          primary border. Pagination or infinite scroll. Refresh button to fetch latest prices.

  agent_detail:
    route: "Modal overlay from /dashboard (or /agents/[id] as standalone)"
    layout: "Full-height dialog/sheet with sections"
    sections:
      - header: "Agent name, risk badge, active/paused status, created date, share button"
      - stats_row: "4 counters: Current Value, P&L%, Cash Remaining, Total Trades"
      - holdings: >
          Table or cards: token icon + symbol, quantity held, avg buy price, current price,
          unrealized P&L ($ and %), allocation % of portfolio. Optional donut chart visualization.
      - ai_decisions: >
          Timeline of recent AI decisions. Each entry: timestamp, should_trade badge (yes/no),
          market_analysis summary (collapsible), reasoning text, action details if trade was made
          (token, direction, amount, confidence bar). Expandable raw JSON for debugging.
      - trade_history: >
          Paginated table: timestamp, action badge (BUY green / SELL red), token, USD amount,
          token amount, price at execution, confidence bar, reasoning (tooltip or expandable).

  buy_sct:
    route: "/dashboard (via buy-sct-widget or modal)"
    layout: "Dialog or dedicated section"
    flow:
      - step_1: "Display 3 tier cards with pricing, current SCT balance, available agent slots"
      - step_2: "Selected tier highlighted. Network check — prompt Arbitrum switch if needed"
      - step_3: "USDT Approve transaction (shows MetaMask popup, loading state)"
      - step_4: "SCT Purchase transaction (shows MetaMask popup, loading state)"
      - step_5: "Success — animated SCT balance update, 'Deploy an Agent' CTA"
    error_states:
      - "Insufficient USDT balance"
      - "Transaction rejected by user"
      - "Network error"

  share:
    route: "/share/[token]"
    layout: "Public page, no auth, SSR with service-role Supabase"
    content: >
      Agent name heading, owner username, risk badge. Stats: current value, P&L%,
      cash remaining, total trades. Holdings breakdown with live prices. Recent trades
      table (last 20). "Powered by Silicon Coliseum" footer with CTA to sign up.
      Animated progress bars for portfolio allocation. Mesh-gradient background.

  not_found:
    route: "/*"
    layout: "Centered content with mesh-gradient background"
    content: "Large '404' in gradient-text, witty message, 'Back to Arena' button"

# ─────────────────────────────────────────────────────────────────────────────
# Smart Contract (Reference — already deployed, not rebuilt)
# ─────────────────────────────────────────────────────────────────────────────
contract:
  name: SiliconColesiumToken
  symbol: SCT
  standard: ERC-20 + Ownable
  chain: Arbitrum One (42161)
  compiler: Solidity 0.8.20
  framework: Foundry
  dependencies: [openzeppelin-contracts, forge-std]
  key_functions:
    - "purchaseTokens(uint256 tier) — USDT → SCT minting"
    - "wholeTokenBalance(address) — balanceOf / 1e18 (agent slot count)"
    - "withdrawUSDT(address, uint256) — owner revenue withdrawal"
  note: >
    The contract is already deployed. The frontend interacts with it via ethers.js.
    The backend reads wholeTokenBalance for agent gating. No contract redeployment needed.

# ─────────────────────────────────────────────────────────────────────────────
# Key Implementation Notes
# ─────────────────────────────────────────────────────────────────────────────
notes:
  - >
    Migrate from Express + SQLite to Next.js API routes + Supabase Postgres.
    All API routes use Zod validation. Row-level security policies enforce ownership.
  - >
    The AI agent evaluation cron can run as a Vercel Cron Job (vercel.json crons config)
    calling a protected API route, or as a Supabase Edge Function with pg_cron.
  - >
    DexScreener API is free and requires no API key. Rate limit requests to avoid throttling.
  - >
    MetaMask auth flow: use Supabase custom auth or a simple session token approach.
    The wallet address is the primary identity; Supabase auth can wrap this.
  - >
    All glassmorphism, particles, animations, and design tokens should be ported from
    the Launchpad-mvp globals.css and component patterns, re-themed for the crypto arena aesthetic.
  - >
    framer-motion should be used for all transitions, not CSS-only transitions, to match
    the premium feel of the template.
  - >
    PostHog analytics integration is optional but recommended — proxy through Next.js
    rewrites to avoid adblockers (same pattern as Launchpad-mvp).
