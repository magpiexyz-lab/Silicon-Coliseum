# ─────────────────────────────────────────────────────────────────────────────
# Project Structure
# ─────────────────────────────────────────────────────────────────────────────
structure:
  src:
    app:
      layout.tsx: "Root layout — metadata, theme script injection, font loading (JetBrains Mono + Inter)"
      page.tsx: "Landing/marketing page — hero, features grid, live leaderboard preview, how-it-works, pricing tiers, particles + cursor follower"
      globals.css: "All Tailwind @theme inline tokens, keyframe animations, utility classes (.glass, .mesh-gradient, .grain, .gradient-text)"
      not-found.tsx: "Animated 404 with gradient number and CTA"

      login:
        page.tsx: "MetaMask wallet connect page — glassmorphism card over particle background, signature-based auth"
      signup:
        page.tsx: "Username registration after wallet connect — signature verification, success animation"

      dashboard:
        page.tsx: "Server component — fetches user data, agents, holdings, decisions via Supabase; passes to client"
        _components:
          dashboard-client.tsx: "Main app shell — nav bar (wallet address, SCT balance, theme toggle), tabbed interface"
          overview-tab.tsx: "Portfolio summary — total value counter, P&L chart, active agents grid, quick actions"
          agents-tab.tsx: "Agent cards grid with status badges, P&L sparklines, activate/pause/delete controls"
          agent-detail-modal.tsx: "Full agent view — stats cards, holdings donut chart, AI decision log (expandable), trade history table"
          create-agent-form.tsx: "Agent creation dialog — name, risk level selector, budget slider, token multi-select, personality textarea; SCT gate check"
          leaderboard-tab.tsx: "Global ranking table — rank, agent name, owner, risk badge, total value, P&L%, trade count; live price updates"
          holdings-widget.tsx: "Current holdings breakdown with live prices, unrealized P&L per token"
          trade-history.tsx: "Paginated trade log — action badge (BUY green / SELL red), token, amount, price, confidence bar, reasoning tooltip"
          decision-log.tsx: "AI decision timeline — expandable cards showing should_trade, reasoning, market_analysis, raw JSON"
          market-ticker.tsx: "Horizontal scrolling ticker of live meme token prices (animate-marquee)"
          buy-sct-widget.tsx: "SCT purchase flow — tier selection cards, network switch prompt, USDT approval + purchase transactions"
          sct-balance-badge.tsx: "Navbar badge showing SCT balance and agent slot count"

      share:
        "[token]":
          page.tsx: "Public read-only agent performance page — SSR, no auth required, served via share token"
          share-page-client.tsx: "Client rendering — agent stats, P&L chart, holdings, recent trades"

      api:
        auth:
          check/route.ts: "POST — check if wallet address is registered"
          signup/route.ts: "POST — register user with MetaMask signature verification (ethers.verifyMessage)"
        agents:
          route.ts: "GET (list, optional ?user_id filter) + POST (create with SCT gate)"
          "[id]":
            route.ts: "GET (detail with holdings, trades, decisions) + DELETE (owner only)"
            toggle/route.ts: "PATCH — activate/pause agent (owner only)"
        trades:
          route.ts: "GET — last 100 trades globally"
          "[agentId]/route.ts": "GET — paginated trade history for one agent"
        leaderboard:
          route.ts: "GET — all agents ranked by P&L% using live DexScreener prices"
        tokens:
          route.ts: "GET — fixed list of 12 tradeable meme tokens"
          prices/route.ts: "GET — live DexScreener prices for all tokens"
        sct:
          "balance/[walletAddress]/route.ts": "GET — on-chain SCT balance from Arbitrum One"
        evaluate:
          route.ts: "POST — manually trigger AI evaluation of all active agents"
        cron:
          route.ts: "POST — Vercel cron endpoint for periodic agent evaluation (every 1 hour)"
        share:
          route.ts: "POST — generate share token for an agent"
        health:
          route.ts: "GET — health check"

    components:
      ui/: "shadcn/ui components (see shadcn_components list above)"
      interactive-particles.tsx: "Canvas-based particle system with mouse interaction"
      cursor-follower.tsx: "Radial gradient orb following mouse cursor"
      animated-counter.tsx: "Count-up animation triggered by scroll visibility"
      theme-toggle.tsx: "Dark/light toggle with Framer Motion icon transitions"
      wallet-connect-button.tsx: "MetaMask connect button with address truncation and copy"
      risk-level-badge.tsx: "Color-coded risk level badge (conservative=blue, balanced=green, aggressive=amber, degen=red)"
      pnl-display.tsx: "P&L value with green/red coloring and up/down arrow"
      token-icon.tsx: "Meme token icon component with fallback"
      confidence-bar.tsx: "AI confidence visualization (0-100% filled bar)"

    lib:
      types.ts: "All TypeScript interfaces — User, Agent, Holding, Trade, Decision, Token, MarketData, AIResponse, ShareToken"
      supabase.ts: "Browser / server / service-role Supabase client factories"
      supabase-browser.ts: "Browser client singleton"
      utils.ts: "cn() utility (clsx + tailwind-merge)"
      rate-limit.ts: "In-memory IP-based rate limiter (30 reads/min, 10 writes/min)"
      contract.ts: "SCT contract address, ABI, Arbitrum RPC config, tier definitions"
      tokens.ts: "Predefined list of 12 meme tokens with metadata (symbol, name, chain, search query)"
      market.ts: "DexScreener API wrapper — fetch prices, 5m/1h/6h/24h changes, volume, liquidity"
      sentiment.ts: "Cerebras Llama 3.3 70B sentiment analysis — returns scores, buzz level, themes per token"
      agent-engine.ts: "AI trade decision engine — builds prompt with portfolio + market data + sentiment, parses structured JSON response"
      trade-executor.ts: "Paper trade execution logic — BUY (deduct cash, create/update holding with VWAP), SELL (partial/full liquidation)"
      leaderboard.ts: "P&L calculation using live prices — (holdings_value + cash - initial_budget) / initial_budget"
      share.ts: "Share token generation and validation"

    middleware.ts: "Auth session refresh + redirect guards (logged-in users away from /login)"

  supabase:
    migrations:
      "001_initial.sql": >
        Create tables: users (id, username, wallet_address, signature, message, created_at),
        agents (id, user_id, name, risk_level, initial_budget, current_balance, tokens JSON, is_active, personality, created_at),
        holdings (id, agent_id, token, amount, avg_buy_price — unique agent_id+token),
        trades (id, agent_id, action, token, amount_usd, price, token_amount, confidence, reasoning, created_at),
        decisions (id, agent_id, should_trade, reasoning, market_analysis, raw_json, created_at),
        share_tokens (id, agent_id, token, created_at).
        Enable RLS on all tables. Policies: users can read/write own data; agents visible to owner + public for leaderboard;
        trades/decisions readable by agent owner; share_tokens grant read access to associated agent data.

# ─────────────────────────────────────────────────────────────────────────────
# Core Business Logic
# ─────────────────────────────────────────────────────────────────────────────
business_logic:

  authentication:
    method: metamask-signature
    flow:
      1: "User clicks 'Connect Wallet' — requests MetaMask eth_requestAccounts"
      2: "Frontend calls POST /api/auth/check with wallet_address (lowercased)"
      3: "If not registered → prompt username + MetaMask personal_sign of message"
      4: "POST /api/auth/signup verifies signature via ethers.verifyMessage, creates user"
      5: "Session managed via Supabase auth (wallet as identifier)"
    notes: "No passwords, no email. Wallet address is the identity."

  token_gating:
    token: SCT (SiliconColesiumToken)
    chain: Arbitrum One (42161)
    contract: ERC-20 + Ownable (OpenZeppelin)
    rule: "1 whole SCT token = 1 agent creation slot"
    enforcement:
      - "Backend reads wholeTokenBalance(address) on-chain via ethers before allowing agent creation"
      - "Frontend displays SCT balance and available slots in navbar badge"
    purchase_tiers:
      - { tier: 1, usdt_cost: 1, sct_received: 1, rate: "$1.00/SCT", label: "Starter" }
      - { tier: 10, usdt_cost: 10, sct_received: 20, rate: "$0.50/SCT", label: "Pro (Popular)" }
      - { tier: 100, usdt_cost: 100, sct_received: 250, rate: "$0.40/SCT", label: "Whale (Best Value)" }
    purchase_flow:
      1: "User selects tier on Buy SCT page"
      2: "Frontend checks network — prompts switch to Arbitrum One if needed"
      3: "USDT approve transaction (ERC-20 approval to SCT contract)"
      4: "SCT purchaseTokens(tier) transaction"
      5: "Balance updates reflected in navbar"

  ai_agents:
    creation:
      fields:
        - { name: name, type: text, validation: "2-30 chars, required" }
        - { name: risk_level, type: select, options: [conservative, balanced, aggressive, degen], required: true }
        - { name: initial_budget, type: number, range: "$10 - $100,000", required: true }
        - { name: tokens, type: multi-select, source: "predefined 12 meme tokens", max: 12, min: 1 }
        - { name: personality, type: textarea, optional: true, description: "Custom AI instructions for agent behavior" }
      gate: "SCT balance >= current agent count + 1"

    risk_profiles:
      conservative: "Focus on established tokens, smaller positions (5-15% of budget), high confidence threshold (0.7+), rarely trades"
      balanced: "Mix of established and trending, moderate positions (10-25%), medium confidence (0.5+)"
      aggressive: "Trend-chasing, larger positions (15-40%), lower confidence threshold (0.3+), trades frequently"
      degen: "Maximum risk, massive positions (up to 50%), trades on any signal, YOLO mentality"

  trading_loop:
    schedule: "Every 1 hour (configurable via CRON_INTERVAL_MINUTES)"
    implementation: "Vercel Cron or Supabase pg_cron calling POST /api/cron"
    flow:
      1: "Fetch all active agents from database"
      2: "For each agent, gather: current holdings, cash balance, recent trades, selected tokens"
      3: "Fetch live market data from DexScreener for agent's token set"
      4: "Run sentiment analysis via Cerebras Llama 3.3 70B for each token"
      5: "Build comprehensive prompt with portfolio state + market data + sentiment + risk profile + personality"
      6: "AI returns structured JSON decision: { should_trade, reasoning, market_analysis, actions[] }"
      7: "Each action: { action: BUY|SELL, token, amount_usd, confidence, urgency, reason }"
      8: "Execute paper trades: BUY deducts cash → creates/updates holding (VWAP); SELL liquidates → returns cash"
      9: "Store trade records and decision log in database"

  market_data:
    source: DexScreener API (free, no key required)
    endpoint: "https://api.dexscreener.com/latest/dex/search?q={query}"
    data_points:
      - price (USD)
      - price_change_5m, price_change_1h, price_change_6h, price_change_24h
      - volume_24h
      - liquidity
      - market_cap
      - fdv

  sentiment_analysis:
    provider: Cerebras
    model: llama-3.3-70b
    input: "Token name + price data + volume + market context"
    output:
      - sentiment_score: "float -1.0 to +1.0 (bearish to bullish)"
      - buzz_level: "integer 0-10"
      - key_themes: "string[] of trending narratives"
      - summary: "human-readable market sentiment paragraph"

  leaderboard:
    ranking_metric: "P&L percentage = ((holdings_value_at_live_prices + current_cash - initial_budget) / initial_budget) * 100"
    data_points: [rank, agent_name, owner_username, risk_level, initial_budget, total_value, pnl_percent, trade_count]
    live_prices: "DexScreener prices fetched at query time for accurate real-time ranking"
    visibility: public # All agents visible regardless of ownership

  sharing:
    mechanism: "Unique share token generated per agent"
    route: "/share/[token]"
    access: "Public, no auth required, read-only"
    content: "Agent stats, P&L chart, current holdings, recent trades"

