# EVENTS.yaml — Silicon Coliseum Analytics Event Dictionary
#
# funnel_stage values: reach | demand | activate | monetize | retain
# Naming: <object>_<action> in snake_case

global_properties:
  project_name:
    description: From experiment.yaml `name` field. Identifies which experiment this data belongs to.
    type: string
    required: true
  project_owner:
    description: From experiment.yaml `owner` field. Identifies who owns this experiment.
    type: string
    required: true

events:
  visit_landing:
    funnel_stage: demand
    trigger: User loads the landing page
    properties: {}

  cta_click:
    funnel_stage: demand
    trigger: User clicks "Enter the Arena" or "View Arenas" CTA on landing page
    properties:
      cta:
        type: string
        required: true
        description: Which CTA was clicked (enter_the_arena, view_arenas)

  signup_complete:
    funnel_stage: demand
    trigger: User successfully submits the signup form
    properties:
      method:
        type: string
        required: true
        description: Signup method (email, google, github)
      gclid:
        type: string
        required: false
        description: Google Click ID for ad attribution

  arena_entry:
    funnel_stage: activate
    trigger: User deploys an agent into an arena
    properties:
      arena_id:
        type: string
        required: true
        description: Arena UUID
      agent_risk_level:
        type: string
        required: false
        description: Agent risk level (conservative, balanced, aggressive, degen)

  view_arena:
    funnel_stage: activate
    trigger: User views an active arena detail page
    properties:
      arena_id:
        type: string
        required: true
        description: Arena UUID

  share_result:
    funnel_stage: activate
    trigger: User shares an arena result card
    properties:
      arena_id:
        type: string
        required: true
        description: Arena UUID
      share_target:
        type: string
        required: true
        description: Share destination (twitter, copy_link)
