<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-na" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
    <linearGradient id="hair-na" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg-na)" />
  <!-- Body / orange jacket -->
  <ellipse cx="100" cy="198" rx="58" ry="45" fill="#ea580c" />
  <!-- Jacket zipper -->
  <line x1="100" y1="155" x2="100" y2="198" stroke="#b45309" stroke-width="2"/>
  <!-- White jacket collar -->
  <path d="M78,155 Q100,168 122,155" stroke="#f5f5f4" stroke-width="4" fill="none"/>
  <!-- Neck -->
  <rect x="90" y="138" width="20" height="18" rx="5" fill="#fcd9b6" />
  <!-- Head -->
  <ellipse cx="100" cy="100" rx="42" ry="46" fill="#fcd9b6" />
  <!-- SPIKY BLOND HAIR - Naruto's signature -->
  <!-- Center spikes going up -->
  <polygon points="100,20 90,58 110,58" fill="url(#hair-na)"/>
  <polygon points="85,25 78,60 98,55" fill="url(#hair-na)"/>
  <polygon points="115,25 122,60 102,55" fill="url(#hair-na)"/>
  <!-- Side spikes -->
  <polygon points="68,35 65,65 85,55" fill="#f59e0b"/>
  <polygon points="132,35 135,65 115,55" fill="#f59e0b"/>
  <polygon points="52,48 55,75 75,60" fill="#f59e0b"/>
  <polygon points="148,48 145,75 125,60" fill="#f59e0b"/>
  <!-- More side spikes going outward -->
  <polygon points="45,60 50,85 68,70" fill="#eab308"/>
  <polygon points="155,60 150,85 132,70" fill="#eab308"/>
  <!-- Hair base / bangs -->
  <path d="M60 72 Q70 58 100 55 Q130 58 140 72 Q135 65 100 60 Q65 65 60 72" fill="#fbbf24"/>
  <!-- Forehead protector / headband -->
  <rect x="58" y="68" width="84" height="16" rx="3" fill="#3b82f6"/>
  <!-- Metal plate -->
  <rect x="78" y="70" width="44" height="12" rx="2" fill="#94a3b8"/>
  <!-- Leaf village symbol on plate -->
  <path d="M96 76 Q100 72 104 76 L100 80 Z" fill="#475569" stroke="#475569" stroke-width="1"/>
  <path d="M100 73 L100 70" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Headband ties on sides -->
  <path d="M58 74 L45 80 L42 90" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M142 74 L155 80 L158 90" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Ears -->
  <ellipse cx="58" cy="100" rx="6" ry="9" fill="#f0c0a0"/>
  <ellipse cx="142" cy="100" rx="6" ry="9" fill="#f0c0a0"/>
  <!-- Eyebrows -->
  <path d="M72 88 Q82 84 90 88" stroke="#d97706" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M110 88 Q118 84 128 88" stroke="#d97706" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Big expressive eyes -->
  <ellipse cx="82" cy="98" rx="10" ry="9" fill="white"/>
  <ellipse cx="118" cy="98" rx="10" ry="9" fill="white"/>
  <!-- Blue irises -->
  <circle cx="83" cy="99" r="6" fill="#2563eb"/>
  <circle cx="119" cy="99" r="6" fill="#2563eb"/>
  <!-- Pupils -->
  <circle cx="83" cy="99" r="3" fill="#1e1e1e"/>
  <circle cx="119" cy="99" r="3" fill="#1e1e1e"/>
  <!-- Eye highlights - big anime style -->
  <circle cx="86" cy="96" r="2.5" fill="white"/>
  <circle cx="122" cy="96" r="2.5" fill="white"/>
  <circle cx="80" cy="101" r="1" fill="white"/>
  <circle cx="116" cy="101" r="1" fill="white"/>
  <!-- WHISKER MARKS - 3 on each cheek -->
  <!-- Left cheek whiskers -->
  <line x1="60" y1="104" x2="76" y2="106" stroke="#d4a070" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="60" y1="110" x2="76" y2="112" stroke="#d4a070" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="60" y1="116" x2="76" y2="118" stroke="#d4a070" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right cheek whiskers -->
  <line x1="124" y1="106" x2="140" y2="104" stroke="#d4a070" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="124" y1="112" x2="140" y2="110" stroke="#d4a070" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="124" y1="118" x2="140" y2="116" stroke="#d4a070" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="100" cy="110" rx="3" ry="2" fill="#e8b890"/>
  <!-- Big cheerful grin -->
  <path d="M78 122 Q100 142 122 122" stroke="#b87a5a" stroke-width="2.5" fill="#fff0e0"/>
  <!-- Teeth in grin -->
  <line x1="100" y1="124" x2="100" y2="132" stroke="#e8d0b8" stroke-width="0.8"/>
  <!-- Blush marks -->
  <ellipse cx="70" cy="114" rx="8" ry="4" fill="#ff9999" opacity="0.3"/>
  <ellipse cx="130" cy="114" rx="8" ry="4" fill="#ff9999" opacity="0.3"/>
</svg>