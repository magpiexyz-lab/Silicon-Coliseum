<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-ae" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg-ae)" />
  <!-- Body / brown jacket -->
  <ellipse cx="100" cy="198" rx="55" ry="45" fill="#5c4033" />
  <!-- White shirt -->
  <path d="M85,158 L90,172 L100,165 L110,172 L115,158" fill="#e8e0d4"/>
  <!-- Neck -->
  <rect x="90" y="140" width="20" height="18" rx="5" fill="#f0c8a0" />
  <!-- Head -->
  <ellipse cx="100" cy="100" rx="42" ry="48" fill="#f0c8a0" />
  <!-- WILD white hair - the signature look -->
  <!-- Main hair mass - exploding outward -->
  <ellipse cx="100" cy="65" rx="52" ry="30" fill="#e8e0d8"/>
  <!-- Hair tufts going in all directions -->
  <path d="M50 75 Q35 55 45 40 Q55 50 55 65" fill="#e8e0d8"/>
  <path d="M150 75 Q165 55 155 40 Q145 50 145 65" fill="#e8e0d8"/>
  <path d="M60 60 Q45 40 55 28 Q65 38 65 55" fill="#ddd8d0"/>
  <path d="M140 60 Q155 40 145 28 Q135 38 135 55" fill="#ddd8d0"/>
  <path d="M75 50 Q65 25 80 20 Q82 35 80 48" fill="#e8e0d8"/>
  <path d="M125 50 Q135 25 120 20 Q118 35 120 48" fill="#e8e0d8"/>
  <path d="M90 45 Q85 20 100 15 Q100 30 95 42" fill="#ddd8d0"/>
  <path d="M110 45 Q115 20 100 15 Q100 30 105 42" fill="#ddd8d0"/>
  <!-- Side hair puffs -->
  <ellipse cx="52" cy="90" rx="15" ry="20" fill="#e8e0d8"/>
  <ellipse cx="148" cy="90" rx="15" ry="20" fill="#e8e0d8"/>
  <!-- Ears (peeking through hair) -->
  <ellipse cx="58" cy="105" rx="6" ry="9" fill="#e8b890"/>
  <ellipse cx="142" cy="105" rx="6" ry="9" fill="#e8b890"/>
  <!-- Bushy eyebrows -->
  <path d="M70 86 Q80 78 95 84" stroke="#c8c0b8" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M105 84 Q120 78 130 86" stroke="#c8c0b8" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Eyes - wise and kind -->
  <ellipse cx="84" cy="96" rx="7" ry="6" fill="white"/>
  <ellipse cx="116" cy="96" rx="7" ry="6" fill="white"/>
  <circle cx="84" cy="97" r="4" fill="#3d2b1f"/>
  <circle cx="116" cy="97" r="4" fill="#3d2b1f"/>
  <circle cx="86" cy="95" r="1.5" fill="white"/>
  <circle cx="118" cy="95" r="1.5" fill="white"/>
  <!-- Droopy eyelids for wise look -->
  <path d="M76 92 Q84 88 92 92" stroke="#d4a880" stroke-width="1.5" fill="none"/>
  <path d="M108 92 Q116 88 124 92" stroke="#d4a880" stroke-width="1.5" fill="none"/>
  <!-- Big nose -->
  <path d="M98 100 Q102 115 94 118 Q90 116 92 114" stroke="#d4a07a" stroke-width="2.5" fill="#ecc8a8" stroke-linecap="round"/>
  <!-- Thick mustache -->
  <path d="M78 122 Q88 128 100 124 Q112 128 122 122" stroke="#c8c0b8" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Gentle smile under mustache -->
  <path d="M86 130 Q100 138 114 130" stroke="#b87a5a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Wrinkles - forehead -->
  <path d="M78 76 Q100 72 122 76" stroke="#e0b898" stroke-width="0.8" fill="none"/>
  <path d="M80 80 Q100 76 120 80" stroke="#e0b898" stroke-width="0.8" fill="none"/>
</svg>