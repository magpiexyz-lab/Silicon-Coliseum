<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-wb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="suit-wb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg-wb)" />
  <!-- Suit/body -->
  <ellipse cx="100" cy="195" rx="60" ry="45" fill="url(#suit-wb)" />
  <!-- White shirt collar -->
  <polygon points="85,155 100,170 115,155" fill="#f1f5f9" />
  <!-- Tie -->
  <polygon points="97,158 103,158 101,180 99,180" fill="#dc2626" />
  <!-- Neck -->
  <rect x="90" y="140" width="20" height="20" rx="5" fill="#fcd9b6" />
  <!-- Head -->
  <ellipse cx="100" cy="105" rx="42" ry="48" fill="#fcd9b6" />
  <!-- Gray hair - sides -->
  <ellipse cx="62" cy="90" rx="12" ry="22" fill="#d1d5db" />
  <ellipse cx="138" cy="90" rx="12" ry="22" fill="#d1d5db" />
  <!-- Gray hair - top (thinning) -->
  <ellipse cx="100" cy="62" rx="30" ry="10" fill="#d1d5db" />
  <!-- Ears -->
  <ellipse cx="58" cy="105" rx="8" ry="10" fill="#f0c8a0" />
  <ellipse cx="142" cy="105" rx="8" ry="10" fill="#f0c8a0" />
  <!-- Eyebrows -->
  <path d="M75 88 Q82 82 92 86" stroke="#9ca3af" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M108 86 Q118 82 125 88" stroke="#9ca3af" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Glasses frames -->
  <circle cx="84" cy="98" r="14" fill="none" stroke="#475569" stroke-width="3"/>
  <circle cx="116" cy="98" r="14" fill="none" stroke="#475569" stroke-width="3"/>
  <!-- Glasses bridge -->
  <path d="M98 98 L102 98" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  <!-- Glasses arms -->
  <path d="M70 95 L58 92" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M130 95 L142 92" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Eyes behind glasses -->
  <circle cx="84" cy="99" r="4" fill="#1e3a5f"/>
  <circle cx="116" cy="99" r="4" fill="#1e3a5f"/>
  <!-- Eye highlights -->
  <circle cx="86" cy="97" r="1.5" fill="white"/>
  <circle cx="118" cy="97" r="1.5" fill="white"/>
  <!-- Nose -->
  <path d="M98 104 Q100 112 96 113" stroke="#e0a880" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Warm smile -->
  <path d="M82 120 Q100 134 118 120" stroke="#c47a5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Wrinkle lines -->
  <path d="M70 118 Q74 122 72 126" stroke="#e8c4a0" stroke-width="1" fill="none"/>
  <path d="M130 118 Q126 122 128 126" stroke="#e8c4a0" stroke-width="1" fill="none"/>
</svg>